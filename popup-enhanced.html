<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <link rel="stylesheet" href="popup-enhanced.css" />
</head>
<body>
  <div class="pg-container">
    <header class="pg-header">
      <div class="pg-brand">
        <svg class="pg-logo" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
        <div>
          <h1 class="pg-title">PhishGuard</h1>
          <div class="pg-status-indicator" id="protection-status">
            <span class="pg-dot pg-dot-active"></span>
            <span class="pg-status-text">Active</span>
          </div>
        </div>
      </div>
      <div class="pg-header-action" title="Settings">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
      </div>
    </header>

    <div class="pg-grid">
      <div class="pg-card pg-card-primary">
        <div class="pg-card-header">Target Blocked</div>
        <div class="pg-metric" id="total-blocked">0</div>
        <div class="pg-sub-metric" id="blocked-trend">0 today</div>
      </div>
      
      <div class="pg-card">
        <div class="pg-card-header">Avg Latency</div>
        <div class="pg-metric" id="processing-speed">0ms</div>
        <div class="pg-sub-metric">P95 &lt; 50ms</div>
      </div>
    </div>

    <div class="pg-section">
      <h2 class="pg-section-title">Telemetry Activity</h2>
      <div class="pg-feed" id="activity-feed">
        <div class="pg-loader"></div>
      </div>
    </div>

    <div class="pg-action-group">
      <button class="pg-btn pg-btn-primary" id="view-full-dashboard">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        Open Workspace
      </button>
    </div>

    <footer class="pg-footer">
      <div class="pg-footer-status">
        <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        E2E Encrypted (AES-GCM)
      </div>
      <div id="last-update">Syncing...</div>
    </footer>
  </div>
  <script src="popup-enhanced.js"></script>
</body>
</html>
